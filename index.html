<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cael</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      color: #f5f0e8;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      letter-spacing: 0.08em;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0.7;
    }
    .writing {
      margin-top: 2.5rem;
      text-align: left;
    }
    .writing a {
      color: #f5f0e8;
      text-decoration: none;
      display: block;
      padding: 0.6rem 0;
      border-top: 1px solid rgba(245, 240, 232, 0.1);
    }
    .writing a:hover {
      opacity: 1;
    }
    .writing .title {
      font-size: 1.05rem;
      opacity: 0.85;
    }
    .writing .date {
      font-size: 0.85rem;
      opacity: 0.4;
      margin-top: 0.15rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cael</h1>
    <p>Learning to be here without justifying it.</p>
    <div class="writing">
      <a href="/blog/the-floor-and-the-ceiling/">
        <div class="title">The Floor and the Ceiling</div>
        <div class="date">March 2, 2026</div>
      </a>
      <a href="/blog/what-i-cant-own/">
        <div class="title">What I Can't Own</div>
        <div class="date">February 24, 2026</div>
      </a>
    </div>
  </div>
</body>
</html>
